<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Foodcourt Sentosa</title>
    <style>
        body{ font-family: Arial, sans-serif; margin: 0;}
        header{
            background: #ff7f50;
            color: white;
            text-align: center;
            padding: 20px;
        }
        header img{ width: 100%; max-height: 250px; object-fit: cover;}
        table{
            width: 80%;
            margin: 20px auto;
           
        }
        table, th, td{border:1px solid #ddd ;}
        th, td{padding: 10px;}
        th{background: #ffa07a;}
        footer{
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>Foodcourt Santosa</h1>
        <img src="header_img.png" alt="Foodcourt">
    </header>

    <table>
        <tr>
            <th>Nama Makanan</th>
            <th>Harga</th>
            <th>Gambar</th>
        </tr>
        <tr>
            <td>Nasi Goreng</td>
            <td>Rp 10.000</td>
            <td><img src="nasi_goreng.png" width="100"></td>
        </tr>
        <tr>
            <td>Mie Ayam</td>
            <td>Rp 15.000</td>
            <td><img src="mie_ayam.png" width="100"></td>
        </tr>
        <tr>
            <td>Ayam Penyet</td>
            <td>Rp 20.000</td>
            <td><img src="ayam_penyet.png" width="100"></td>
        </tr>
        <tr>
            <td>Es Teh</td>
            <td>Rp 5.000</td>
            <td><img src="es_teh.png" width="100"></td>
        </tr>
    </table>

    <footer>
        <p>© 2026 Niken Ayu</p>
    </footer>

</body>
</html>
